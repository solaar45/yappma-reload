version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: yappma-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: yappma_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Styx PSD2 Service
  styx:
    image: styx/styx:latest
    container_name: yappma-styx
    ports:
      - "8093:8093"
    environment:
      # Styx Configuration
      STYX_MODE: sandbox
      STYX_LOG_LEVEL: debug
      
      # Database
      STYX_DB_HOST: postgres
      STYX_DB_PORT: 5432
      STYX_DB_NAME: styx
      STYX_DB_USER: postgres
      STYX_DB_PASSWORD: postgres
      
      # API Keys (for demo/sandbox)
      STYX_API_KEY: demo-api-key-change-in-production
      
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8093/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Backend (optional - can run locally with mix phx.server)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: yappma-backend
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/yappma_dev
      STYX_BASE_URL: http://styx:8093
      SECRET_KEY_BASE: change-this-in-production-to-a-real-secret-key-base
    depends_on:
      - postgres
      - styx
    volumes:
      - ./backend:/app
      - backend_build:/app/_build
      - backend_deps:/app/deps
    command: mix phx.server
    profiles:
      - full  # Only start with --profile full

  # Frontend (optional - can run locally with npm run dev)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: yappma-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:4000/api
    command: npm run dev -- --host
    profiles:
      - full  # Only start with --profile full

volumes:
  postgres_data:
  backend_build:
  backend_deps:
  frontend_node_modules:
